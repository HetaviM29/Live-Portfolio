services:
  - type: web
    name: ai-portfolio-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://live-portfolio-1.onrender.com,http://localhost:5173,http://localhost:3000
    autoDeploy: true
